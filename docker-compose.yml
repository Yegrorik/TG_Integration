services:
  tg_integration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg-integration
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    ports:
      - "${TG_INTEGRATION_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  tg_polling:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tg-polling
    restart: unless-stopped
    profiles:
      - polling
    command: ["python", "-m", "tg_integration.telegram_polling"]
    env_file:
      - path: ./.env
        required: false
    volumes:
      - ./data:/app/data
    depends_on:
      - tg_integration
